name: Download Free Assets

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/download-free-assets.mjs'
      - '.github/workflows/download-free-assets.yml'
      - 'package.json'

permissions:
  contents: write

jobs:
  download-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download and index free asset packs
        run: npm run assets

      - name: Commit downloaded assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets
          if git diff --cached --quiet; then
            echo "No asset changes to commit."
          else
            git commit -m "Add downloaded free fantasy assets"
            git push
          fi
